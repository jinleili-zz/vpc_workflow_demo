version: '3.8'

services:
  # Redis服务
  redis:
    image: redis:7-alpine
    container_name: nsp-redis
    ports:
      - "6379:6379"
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MySQL服务
  mysql:
    image: mysql:8.0
    container_name: nsp-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
    ports:
      - "3306:3306"
    networks:
      - nsp-network
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql.sh:/docker-entrypoint-initdb.d/init-mysql.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  # Top NSP
  top-nsp:
    image: nsp-top:latest
    container_name: top-nsp
    environment:
      - SERVICE_TYPE=top
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DATA_DB=0
      - REDIS_BROKER_DB=1
      - AZ_NSP_PREFIX=az-nsp
      - AZ_NSP_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # AZ NSP - cn-beijing-1a
  az-nsp-cn-beijing-1a:
    image: nsp-az:latest
    container_name: az-nsp-cn-beijing-1a
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DATA_DB=0
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_beijing_1a
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp:8080
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      top-nsp:
        condition: service_healthy
    networks:
      - nsp-network

  # Worker - cn-beijing-1a
  worker-cn-beijing-1a:
    image: nsp-worker:latest
    container_name: worker-cn-beijing-1a
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - WORKER_TYPE=vpc
      - REDIS_ADDR=redis:6379
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=10
    depends_on:
      redis:
        condition: service_healthy
      az-nsp-cn-beijing-1a:
        condition: service_started
    networks:
      - nsp-network

  # AZ NSP - cn-beijing-1b
  az-nsp-cn-beijing-1b:
    image: nsp-az:latest
    container_name: az-nsp-cn-beijing-1b
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DATA_DB=0
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_beijing_1b
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp:8080
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      top-nsp:
        condition: service_healthy
    networks:
      - nsp-network

  # Worker - cn-beijing-1b
  worker-cn-beijing-1b:
    image: nsp-worker:latest
    container_name: worker-cn-beijing-1b
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - WORKER_TYPE=vpc
      - REDIS_ADDR=redis:6379
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=10
    depends_on:
      redis:
        condition: service_healthy
      az-nsp-cn-beijing-1b:
        condition: service_started
    networks:
      - nsp-network

  # AZ NSP - cn-shanghai-1a
  az-nsp-cn-shanghai-1a:
    image: nsp-az:latest
    container_name: az-nsp-cn-shanghai-1a
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DATA_DB=0
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_shanghai_1a
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp:8080
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      top-nsp:
        condition: service_healthy
    networks:
      - nsp-network

  # Worker - cn-shanghai-1a
  worker-cn-shanghai-1a:
    image: nsp-worker:latest
    container_name: worker-cn-shanghai-1a
    environment:
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - WORKER_TYPE=vpc
      - REDIS_ADDR=redis:6379
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=2
    depends_on:
      redis:
        condition: service_healthy
      az-nsp-cn-shanghai-1a:
        condition: service_started
    networks:
      - nsp-network

volumes:
  mysql-data:

networks:
  nsp-network:
    driver: bridge