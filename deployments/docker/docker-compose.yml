version: '3.8'

services:
  namesrv:
    image: apache/rocketmq:4.9.4
    container_name: rocketmq-namesrv
    ports:
      - "9876:9876"
    environment:
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=128M
    command: sh mqnamesrv
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9876 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  broker:
    image: apache/rocketmq:4.9.4
    container_name: rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=namesrv:9876
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=256M
    volumes:
      - ./broker.conf:/home/rocketmq/rocketmq-4.9.4/conf/broker.conf
    command: sh mqbroker -n namesrv:9876 -c /home/rocketmq/rocketmq-4.9.4/conf/broker.conf
    depends_on:
      namesrv:
        condition: service_healthy
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 10911 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nsp-redis
    ports:
      - "6379:6379"
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: nsp-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
    ports:
      - "3306:3306"
    networks:
      - nsp-network
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql.sh:/docker-entrypoint-initdb.d/init-mysql.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  top-nsp:
    image: nsp-top:latest
    container_name: top-nsp
    environment:
      - SERVICE_TYPE=top
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DATA_DB=0
      - AZ_NSP_PREFIX=az-nsp
      - AZ_NSP_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  az-nsp-cn-beijing-1a:
    image: nsp-az:latest
    container_name: az-nsp-cn-beijing-1a
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DATA_DB=0
      - ROCKETMQ_NAMESRV=namesrv:9876
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_beijing_1a
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp:8080
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      broker:
        condition: service_healthy
      top-nsp:
        condition: service_healthy
    networks:
      - nsp-network

  worker-switch-cn-beijing-1a:
    image: nsp-worker:latest
    container_name: worker-switch-cn-beijing-1a
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - WORKER_TYPE=switch
      - ROCKETMQ_NAMESRV=namesrv:9876
    depends_on:
      broker:
        condition: service_healthy
      az-nsp-cn-beijing-1a:
        condition: service_started
    networks:
      - nsp-network

  worker-firewall-cn-beijing-1a:
    image: nsp-worker:latest
    container_name: worker-firewall-cn-beijing-1a
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - WORKER_TYPE=firewall
      - ROCKETMQ_NAMESRV=namesrv:9876
    depends_on:
      broker:
        condition: service_healthy
      az-nsp-cn-beijing-1a:
        condition: service_started
    networks:
      - nsp-network

  worker-loadbalancer-cn-beijing-1a:
    image: nsp-worker:latest
    container_name: worker-loadbalancer-cn-beijing-1a
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - WORKER_TYPE=loadbalancer
      - ROCKETMQ_NAMESRV=namesrv:9876
    depends_on:
      broker:
        condition: service_healthy
      az-nsp-cn-beijing-1a:
        condition: service_started
    networks:
      - nsp-network

  az-nsp-cn-beijing-1b:
    image: nsp-az:latest
    container_name: az-nsp-cn-beijing-1b
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DATA_DB=0
      - ROCKETMQ_NAMESRV=namesrv:9876
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_beijing_1b
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp:8080
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      broker:
        condition: service_healthy
      top-nsp:
        condition: service_healthy
    networks:
      - nsp-network

  worker-switch-cn-beijing-1b:
    image: nsp-worker:latest
    container_name: worker-switch-cn-beijing-1b
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - WORKER_TYPE=switch
      - ROCKETMQ_NAMESRV=namesrv:9876
    depends_on:
      broker:
        condition: service_healthy
      az-nsp-cn-beijing-1b:
        condition: service_started
    networks:
      - nsp-network

  worker-firewall-cn-beijing-1b:
    image: nsp-worker:latest
    container_name: worker-firewall-cn-beijing-1b
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - WORKER_TYPE=firewall
      - ROCKETMQ_NAMESRV=namesrv:9876
    depends_on:
      broker:
        condition: service_healthy
      az-nsp-cn-beijing-1b:
        condition: service_started
    networks:
      - nsp-network

  az-nsp-cn-shanghai-1a:
    image: nsp-az:latest
    container_name: az-nsp-cn-shanghai-1a
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DATA_DB=0
      - ROCKETMQ_NAMESRV=namesrv:9876
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_shanghai_1a
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp:8080
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      broker:
        condition: service_healthy
      top-nsp:
        condition: service_healthy
    networks:
      - nsp-network

  worker-switch-cn-shanghai-1a:
    image: nsp-worker:latest
    container_name: worker-switch-cn-shanghai-1a
    environment:
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - WORKER_TYPE=switch
      - ROCKETMQ_NAMESRV=namesrv:9876
    depends_on:
      broker:
        condition: service_healthy
      az-nsp-cn-shanghai-1a:
        condition: service_started
    networks:
      - nsp-network

  worker-firewall-cn-shanghai-1a:
    image: nsp-worker:latest
    container_name: worker-firewall-cn-shanghai-1a
    environment:
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - WORKER_TYPE=firewall
      - ROCKETMQ_NAMESRV=namesrv:9876
    depends_on:
      broker:
        condition: service_healthy
      az-nsp-cn-shanghai-1a:
        condition: service_started
    networks:
      - nsp-network

volumes:
  mysql-data:

networks:
  nsp-network:
    driver: bridge