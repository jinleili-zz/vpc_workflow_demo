version: '3.8'

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - ./redis-node-1.conf:/usr/local/etc/redis/redis.conf
      - redis-node-1-data:/data
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 64m

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6380:6380"
    volumes:
      - ./redis-node-2.conf:/usr/local/etc/redis/redis.conf
      - redis-node-2-data:/data
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 64m

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6381:6381"
    volumes:
      - ./redis-node-3.conf:/usr/local/etc/redis/redis.conf
      - redis-node-3-data:/data
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 64m

  redis-cluster-setup:
    image: redis:7-alpine
    container_name: redis-cluster-setup
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
    volumes:
      - ./redis-cluster-setup.sh:/setup.sh
    networks:
      - nsp-network
    entrypoint: ["/bin/sh", "/setup.sh"]

  mysql:
    image: mysql:8.0
    container_name: nsp-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
    ports:
      - "3306:3306"
    networks:
      - nsp-network
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql.sh:/docker-entrypoint-initdb.d/init-mysql.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password
    mem_limit: 512m

  top-nsp-vpc:
    image: nsp-top-vpc:latest
    container_name: top-nsp-vpc
    environment:
      - SERVICE_TYPE=top
      - PORT=8080
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_DATA_DB=0
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - AZ_NSP_PREFIX=az-nsp-vpc
      - AZ_NSP_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 64m

  top-nsp-vfw:
    image: nsp-top-vfw:latest
    container_name: top-nsp-vfw
    environment:
      - PORT=8082
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      top-nsp-vpc:
        condition: service_healthy
    networks:
      - nsp-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 64m

  az-nsp-vpc-cn-beijing-1a:
    image: nsp-az-vpc:latest
    container_name: az-nsp-vpc-cn-beijing-1a
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - PORT=8080
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_DATA_DB=0
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_beijing_1a_vpc
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp-vpc:8080
      - AZ_NSP_VFW_ADDR=http://az-nsp-vfw-cn-beijing-1a:8080
      - NSP_ADDR=http://az-nsp-vpc-cn-beijing-1a:8080
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      top-nsp-vpc:
        condition: service_healthy
    networks:
      - nsp-network
    mem_limit: 64m

  az-nsp-vfw-cn-beijing-1a:
    image: nsp-az-vfw:latest
    container_name: az-nsp-vfw-cn-beijing-1a
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - PORT=8080
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_beijing_1a_vfw
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_VFW_ADDR=http://top-nsp-vfw:8082
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      top-nsp-vfw:
        condition: service_healthy
    networks:
      - nsp-network
    mem_limit: 64m

  worker-switch-cn-beijing-1a:
    image: nsp-worker:latest
    container_name: worker-switch-cn-beijing-1a
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - WORKER_TYPE=switch
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=10
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      az-nsp-vpc-cn-beijing-1a:
        condition: service_started
    networks:
      - nsp-network
    mem_limit: 32m

  worker-firewall-cn-beijing-1a:
    image: nsp-worker:latest
    container_name: worker-firewall-cn-beijing-1a
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1a
      - WORKER_TYPE=firewall
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=10
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      az-nsp-vpc-cn-beijing-1a:
        condition: service_started
      az-nsp-vfw-cn-beijing-1a:
        condition: service_started
    networks:
      - nsp-network
    mem_limit: 32m

  az-nsp-vpc-cn-beijing-1b:
    image: nsp-az-vpc:latest
    container_name: az-nsp-vpc-cn-beijing-1b
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - PORT=8080
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_DATA_DB=0
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_beijing_1b_vpc
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp-vpc:8080
      - AZ_NSP_VFW_ADDR=http://az-nsp-vfw-cn-beijing-1b:8080
      - NSP_ADDR=http://az-nsp-vpc-cn-beijing-1b:8080
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      top-nsp-vpc:
        condition: service_healthy
    networks:
      - nsp-network
    mem_limit: 64m

  az-nsp-vfw-cn-beijing-1b:
    image: nsp-az-vfw:latest
    container_name: az-nsp-vfw-cn-beijing-1b
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - PORT=8080
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_beijing_1b_vfw
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_VFW_ADDR=http://top-nsp-vfw:8082
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      top-nsp-vfw:
        condition: service_healthy
    networks:
      - nsp-network
    mem_limit: 64m

  worker-switch-cn-beijing-1b:
    image: nsp-worker:latest
    container_name: worker-switch-cn-beijing-1b
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - WORKER_TYPE=switch
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=10
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      az-nsp-vpc-cn-beijing-1b:
        condition: service_started
    networks:
      - nsp-network
    mem_limit: 32m

  worker-firewall-cn-beijing-1b:
    image: nsp-worker:latest
    container_name: worker-firewall-cn-beijing-1b
    environment:
      - REGION=cn-beijing
      - AZ=cn-beijing-1b
      - WORKER_TYPE=firewall
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=10
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      az-nsp-vpc-cn-beijing-1b:
        condition: service_started
      az-nsp-vfw-cn-beijing-1b:
        condition: service_started
    networks:
      - nsp-network
    mem_limit: 32m

  az-nsp-vpc-cn-shanghai-1a:
    image: nsp-az-vpc:latest
    container_name: az-nsp-vpc-cn-shanghai-1a
    environment:
      - SERVICE_TYPE=az
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - PORT=8080
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_DATA_DB=0
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_shanghai_1a_vpc
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_ADDR=http://top-nsp-vpc:8080
      - AZ_NSP_VFW_ADDR=http://az-nsp-vfw-cn-shanghai-1a:8080
      - NSP_ADDR=http://az-nsp-vpc-cn-shanghai-1a:8080
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      top-nsp-vpc:
        condition: service_healthy
    networks:
      - nsp-network
    mem_limit: 64m

  az-nsp-vfw-cn-shanghai-1a:
    image: nsp-az-vfw:latest
    container_name: az-nsp-vfw-cn-shanghai-1a
    environment:
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - PORT=8080
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=nsp_cn_shanghai_1a_vfw
      - MYSQL_USER=nsp_user
      - MYSQL_PASSWORD=nsp_password
      - TOP_NSP_VFW_ADDR=http://top-nsp-vfw:8082
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      top-nsp-vfw:
        condition: service_healthy
    networks:
      - nsp-network
    mem_limit: 64m

  worker-switch-cn-shanghai-1a:
    image: nsp-worker:latest
    container_name: worker-switch-cn-shanghai-1a
    environment:
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - WORKER_TYPE=switch
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=3
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      az-nsp-vpc-cn-shanghai-1a:
        condition: service_started
    networks:
      - nsp-network
    mem_limit: 32m

  worker-firewall-cn-shanghai-1a:
    image: nsp-worker:latest
    container_name: worker-firewall-cn-shanghai-1a
    environment:
      - REGION=cn-shanghai
      - AZ=cn-shanghai-1a
      - WORKER_TYPE=firewall
      - REDIS_ADDR=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - REDIS_BROKER_DB=1
      - WORKER_COUNT=2
    depends_on:
      redis-cluster-setup:
        condition: service_completed_successfully
      az-nsp-vpc-cn-shanghai-1a:
        condition: service_started
      az-nsp-vfw-cn-shanghai-1a:
        condition: service_started
    networks:
      - nsp-network
    mem_limit: 32m

  asynq-dashboard:
    image: hibiken/asynqmon:latest
    container_name: asynq-dashboard
    command: 
      - --redis-cluster-nodes=redis-node-1:6379,redis-node-2:6380,redis-node-3:6381
      - --port=8081
    ports:
      - "8081:8081"
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
    networks:
      - nsp-network
    mem_limit: 64m

volumes:
  mysql-data:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:

networks:
  nsp-network:
    driver: bridge