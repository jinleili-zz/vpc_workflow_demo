# E2E config - single Redis node (no cluster)
region: "cn-beijing"
az: ""
port: 8080

redis:
  host: "e2e-redis"
  port: 6379
  password: ""
  data_db: 0
  broker_db: 1
  max_idle: 3
  max_active: 10
  idle_timeout: 240

postgresql:
  host: "postgres"
  port: 5432
  user: "nsp_user"
  password: "nsp_password"

top_nsp:
  az_nsp_prefix: "e2e-az-nsp-vpc"
  az_nsp_port: 8080

az_nsp:
  top_nsp_addr: "http://e2e-top-nsp-vpc:8080"
  worker_count: 2
